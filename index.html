<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAVEESHA KARUNARATHNA | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000; --text-primary: #FFFFFF; --text-secondary: #AAAAAA;
            --glass-bg: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.18);
            --glass-blur: blur(30px);
            --glass-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.3), inset 0 -1px 1px rgba(0, 0, 0, 0.2), 0 20px 50px rgba(0, 0, 0, 0.6);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background-color: var(--bg-color); font-family: 'Inter', sans-serif; color: var(--text-primary); overflow-x: hidden; }
        #tsparticles { position: fixed; width: 100%; height: 100%; z-index: 1; }
        
        nav { position: fixed; top: 15px; right: 15px; display: flex; gap: 10px; z-index: 100; }
        .nav-item { text-decoration: none; color: white; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; padding: 10px 18px; border-radius: 50px; background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); transition: 0.3s ease; cursor: pointer; display: flex; align-items: center; }
        .nav-item:hover { background: rgba(255, 255, 255, 0.1); }

        .dropdown { position: relative; }
        .dropdown-content { display: none; position: absolute; right: 0; top: 50px; min-width: 160px; background: rgba(10, 10, 10, 0.7); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); border-radius: 20px; overflow: hidden; box-shadow: var(--glass-shadow); }
        .dropdown-content.show { display: block; }
        .dropdown-content a { color: white; padding: 14px 20px; text-decoration: none; display: block; font-size: 0.75rem; transition: 0.3s; }

        main { position: relative; z-index: 2; width: 100%; height: 100vh; }
        section { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; animation: fadeIn 0.8s ease forwards; }
        
        /* Show Home by default, or others when targeted */
        section#home { display: flex; }

        .hero h1 { font-size: 12vw; background: linear-gradient(135deg, #fff 0%, #888 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; line-height: 1.1; }
        @media (min-width: 768px) { .hero h1 { font-size: 5rem; } }
        
        .glass-card { background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); border-radius: 32px; padding: 40px; max-width: 800px; width: 100%; box-shadow: var(--glass-shadow); }
        .typewriter-container { font-size: 1rem; color: var(--text-secondary); margin-top: 20px; }
        .cursor { animation: blink 0.8s infinite; font-weight: bold; }
        @keyframes blink { 50% { opacity: 0; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="tsparticles"></div>
    <nav>
        <a href="index.html" class="nav-item">Home</a>
        <a href="index.html#about" target="_blank" class="nav-item">About</a>
        <div class="dropdown">
            <div class="nav-item" id="moreBtn">More ▾</div>
            <div class="dropdown-content" id="moreDropdown">
                <a href="index.html#contact" target="_blank">Contact Me</a>
                <a href="index.html#faq" target="_blank">FAQ</a>
                <a href="index.html#notes" target="_blank">Notes</a>
            </div>
        </div>
    </nav>

    <main>
        <section id="home" class="hero">
            <h1 id="typed-name"></h1>
            <div class="typewriter-container"><span id="typed-text"></span><span class="cursor">|</span></div>
        </section>

        <section id="about">
            <div class="glass-card">
                <h2>Hi!, I'm Kaveesha</h2>
                <p>Product Engineer (HAI) & Creative Technologist. I architect the logic and build the interfaces where human intent meets AI.</p>
            </div>
        </section>

        <section id="contact"><div class="glass-card"><h2>Contact</h2><p>Let's build together.</p></div></section>
        <section id="faq"><div class="glass-card"><h2>FAQ</h2><p>Common inquiries.</p></div></section>
        <section id="notes"><div class="glass-card"><h2>Notes</h2><p>Technical logs.</p></div></section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
    <script>
        // Toggle Dropdown
        const moreBtn = document.getElementById('moreBtn');
        const moreDropdown = document.getElementById('moreDropdown');
        moreBtn.addEventListener('click', (e) => { e.stopPropagation(); moreDropdown.classList.toggle('show'); });
        document.addEventListener('click', () => { moreDropdown.classList.remove('show'); });

        // ROUTING LOGIC: Show section based on URL hash
        function handleRoute() {
            const hash = window.location.hash || '#home';
            document.querySelectorAll('main section').forEach(section => {
                section.style.display = 'none';
            });
            const target = document.querySelector(hash);
            if (target) target.style.display = 'flex';
        }

        window.addEventListener('load', handleRoute);

        // Typewriter Effect
        document.addEventListener("DOMContentLoaded", () => {
            const nameToType = "KAVEESHA KARUNARATHNA";
            const sublineToType = "Product Engineer (HAI) | Creative Technologist";
            const nameElement = document.getElementById("typed-name");
            const sublineElement = document.getElementById("typed-text");
            let nIndex = 0, sIndex = 0;
            function typeName() {
                if (nIndex < nameToType.length) {
                    nameElement.innerHTML += nameToType.charAt(nIndex); nIndex++; setTimeout(typeName, 80);
                } else { setTimeout(typeSubline, 500); }
            }
            function typeSubline() {
                if (sIndex < sublineToType.length) {
                    sublineElement.innerHTML += sublineToType.charAt(sIndex); sIndex++; setTimeout(typeSubline, 50);
                }
            }
            typeName();
        });

        tsParticles.load("tsparticles", { fpsLimit: 60, background: { color: "#000000" }, particles: { number: { value: 140, density: { enable: true, area: 800 } }, color: { value: "#ffffff" }, shape: { type: "circle" }, opacity: { value: { min: 0.1, max: 0.6 } }, size: { value: { min: 1, max: 3 } }, move: { enable: true, speed: 0.5, outModes: { default: "out" } } }, interactivity: { events: { onHover: { enable: true, mode: "repulse" }, resize: true }, modes: { repulse: { distance: 120, duration: 0.4 } } } });
    </script>
</body>
</html>
