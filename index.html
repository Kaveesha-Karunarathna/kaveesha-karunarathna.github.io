<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAVEESHA KARUNARATHNA | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root {
            --bg: #000000;
            --primary: #ffffff;
            --secondary: #888888;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.12);
            --blur: blur(25px);
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.7), inset 0 1px 1px rgba(255, 255, 255, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { 
            width: 100%; height: 100%; background: var(--bg); 
            font-family: 'Inter', sans-serif; color: var(--primary);
            overflow-x: hidden; scroll-behavior: smooth;
        }

        #tsparticles { position: fixed; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

        /* --- NAVIGATION --- */
        nav { position: fixed; top: 30px; right: 30px; display: flex; gap: 12px; z-index: 1000; }
        .nav-item {
            text-decoration: none; color: #fff; font-size: 0.7rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 2px; padding: 12px 25px;
            border-radius: 100px; background: var(--glass); backdrop-filter: var(--blur);
            border: 1px solid var(--border); box-shadow: var(--shadow); 
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); cursor: pointer;
        }
        .nav-item:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-3px); border-color: #fff; }

        .dropdown { position: relative; }
        .dropdown-content {
            display: none; position: absolute; right: 0; top: 55px; min-width: 180px;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: var(--blur);
            border: 1px solid var(--border); border-radius: 20px; overflow: hidden;
        }
        .dropdown-content.show { display: block; animation: fadeIn 0.3s ease; }
        .dropdown-content a { color: var(--secondary); padding: 15px 25px; text-decoration: none; display: block; font-size: 0.8rem; transition: 0.3s; }
        .dropdown-content a:hover { background: rgba(255, 255, 255, 0.05); color: #fff; }

        /* --- MAIN LAYOUT --- */
        main { position: relative; z-index: 1; width: 100%; }
        section {
            display: none; min-height: 100vh; flex-direction: column; 
            align-items: center; justify-content: flex-start;
            padding: 15vh 20px 10vh; animation: sectionFade 1s ease;
        }
        @keyframes sectionFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .content-center { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; max-width: 1000px; margin: 0 auto; }
        .hero-title { font-size: clamp(2.5rem, 8vw, 5.5rem); font-weight: 800; letter-spacing: -3px; text-align: center; margin-bottom: 20px; line-height: 1; }
        .sub-title { font-size: 1.1rem; color: var(--secondary); text-align: center; }

        /* --- CONTACT SECTION (RACHEL HOW STYLE) --- */
        .contact-wrapper { display: grid; grid-template-columns: 1fr 1.2fr; gap: 60px; width: 100%; text-align: left; align-items: start; }
        .contact-left h1 { font-size: 3.5rem; font-weight: 800; margin-bottom: 20px; letter-spacing: -2px; }
        .contact-left p { color: var(--secondary); line-height: 1.6; font-size: 1.1rem; }
        .contact-left a { color: var(--primary); text-decoration: underline; text-underline-offset: 4px; transition: 0.3s; }
        .contact-left a:hover { opacity: 0.7; }

        .contact-form { display: flex; flex-direction: column; gap: 30px; }
        .form-group { display: flex; flex-direction: column; gap: 10px; }
        .field-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: var(--secondary); font-weight: 600; }
        
        .line-input {
            background: transparent; border: none; border-bottom: 1px solid var(--border);
            padding: 12px 0; color: #fff; font-size: 1.1rem; font-family: inherit;
            transition: 0.3s; outline: none;
        }
        .line-input:focus { border-bottom-color: #fff; }
        
        .checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .checkbox-field { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 0.9rem; color: var(--secondary); }
        .checkbox-field input { accent-color: #fff; width: 18px; height: 18px; }

        .submit-btn {
            background: #fff; color: #000; border: none; padding: 20px; border-radius: 12px;
            font-weight: 700; text-transform: uppercase; letter-spacing: 2px; cursor: pointer;
            transition: 0.4s; margin-top: 20px; font-size: 0.8rem;
        }
        .submit-btn:hover { transform: scale(1.02); background: #f0f0f0; }

        /* --- ABOUT CONTENT STYLES --- */
        .about-container { display: flex; flex-direction: column; align-items: center; gap: 40px; text-align: center; }
        .about-photo { width: 180px; height: 180px; border-radius: 30px; object-fit: cover; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .about-text { font-size: 1.1rem; line-height: 1.7; color: var(--secondary); max-width: 700px; }
        .about-text strong { color: var(--primary); font-weight: 600; }

        /* --- FOOTER --- */
        .pro-footer {
            width: 100%; max-width: 1100px; padding: 80px 40px 40px;
            margin-top: 20vh; border-top: 1px solid var(--border);
            display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 40px;
        }
        .footer-photo-small { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); background: #222; }
        .footer-logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -1px; }
        .footer-col h4 { font-size: 0.65rem; color: var(--secondary); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        .footer-col a { display: block; color: var(--primary); text-decoration: none; font-size: 0.85rem; margin-bottom: 12px; transition: 0.3s; opacity: 0.7; }
        .footer-col a:hover { opacity: 1; transform: translateX(5px); }
        .footer-bottom { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center; padding-top: 40px; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 40px; }
        .social-icons { display: flex; gap: 20px; }
        .social-icons a { color: var(--secondary); font-size: 1.4rem; transition: 0.3s; }
        .social-icons a:hover { color: #fff; transform: translateY(-3px); }
        .copyright { font-size: 0.65rem; color: var(--secondary); letter-spacing: 2px; text-transform: uppercase; opacity: 0.5; }

        @media (max-width: 900px) {
            .contact-wrapper { grid-template-columns: 1fr; gap: 40px; }
            .pro-footer { grid-template-columns: 1fr 1fr; }
            nav { top: 15px; right: 15px; left: 15px; justify-content: center; }
            .footer-bottom { flex-direction: column; gap: 20px; text-align: center; }
        }
    </style>
</head>
<body>

    <div id="tsparticles"></div>

    <nav>
        <a href="#home" class="nav-item">Home</a>
        <a href="#about" class="nav-item">About</a>
        <a href="#work" class="nav-item">Work</a>
        <div class="dropdown">
            <div class="nav-item" id="moreBtn">More ▾</div>
            <div class="dropdown-content" id="moreDropdown">
                <a href="#contact">Contact</a>
                <a href="#faq">FAQ</a>
                <a href="#notes">Notes</a>
            </div>
        </div>
    </nav>

    <main id="main-container"></main>

    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>

    <script>
        const myPhoto = "profile.jpg"; 

        const footerHTML = `
            <footer class="pro-footer">
                <div class="footer-col">
                    <div class="footer-brand">
                        <img src="${myPhoto}" alt="Kaveesha" class="footer-photo-small" onerror="this.src='https://via.placeholder.com/50'">
                        <div class="footer-logo">KK</div>
                    </div>
                </div>
                <div class="footer-col">
                    <h4>Hello</h4>
                    <a href="#about">About</a>
                    <a href="#contact">Contact</a>
                    <a href="#faq">FAQ</a>
                </div>
                <div class="footer-col">
                    <h4>Explore</h4>
                    <a href="#work">Work</a>
                    <a href="#notes">Notes</a>
                </div>
                <div class="footer-col">
                    <h4>Social</h4>
                    <a href="https://www.linkedin.com/in/kaveesha-karunarathna-knk/" target="_blank">LinkedIn</a>
                    <a href="https://github.com/Kaveesha-Karunarathna" target="_blank">GitHub</a>
                    <a href="https://www.instagram.com/kaveesha_nimnadh/" target="_blank">Instagram</a>
                </div>
                <div class="footer-bottom">
                    <div class="copyright">© 2026 KAVEESHA KARUNARATHNA</div>
                    <div class="social-icons">
                        <a href="https://www.linkedin.com/in/kaveesha-karunarathna-knk/" target="_blank"><i class="fa-brands fa-linkedin"></i></a>
                        <a href="https://github.com/Kaveesha-Karunarathna" target="_blank"><i class="fa-brands fa-github"></i></a>
                        <a href="https://www.instagram.com/kaveesha_nimnadh/" target="_blank"><i class="fa-brands fa-instagram"></i></a>
                    </div>
                </div>
            </footer>
        `;

        const sections = [
            { id: 'home', title: '<h1 class="hero-title" id="name"></h1><div class="sub-title" id="tagline"></div>' },
            { 
                id: 'about', 
                title: `
                    <div class="about-container">
                        <img src="${myPhoto}" alt="Kaveesha" class="about-photo" onerror="this.style.display='none'">
                        <h1 class="hero-title">About</h1>
                        <div class="about-text">
                            Hey! I’m <strong>Kaveesha Karunarathna</strong>, a Product Engineer (HAI) and Creative Technologist. Currently an undergraduate at the <strong>University of Moratuwa</strong>.
                        </div>
                    </div>
                `
            },
            { id: 'work', title: '<h1 class="hero-title">Selected Work</h1><div class="sub-title">Design Meets Intelligence</div>' },
            { 
                id: 'contact', 
                title: `
                    <div class="contact-wrapper">
                        <div class="contact-left">
                            <h1>Let's get in touch!</h1>
                            <p>For business enquiries, <a href="mailto:kaveeshanimnadh@gmail.com">email me</a> or complete the form.<br><br>
                            Looking to build logic-driven interfaces or bridge the gap with AI intelligence? Reach out.</p>
                        </div>
                        <form class="contact-form">
                            <div class="form-group">
                                <label class="field-label">My name is</label>
                                <input type="text" class="line-input" placeholder="Your name" required>
                            </div>
                            <div class="form-group">
                                <label class="field-label">My email is</label>
                                <input type="email" class="line-input" placeholder="Your email" required>
                            </div>
                            <div class="form-group">
                                <label class="field-label">I'm looking for:</label>
                                <div class="checkbox-grid">
                                    <label class="checkbox-field"><input type="checkbox"> AI Integration</label>
                                    <label class="checkbox-field"><input type="checkbox"> Product Engineering</label>
                                    <label class="checkbox-field"><input type="checkbox"> Creative Tech</label>
                                    <label class="checkbox-field"><input type="checkbox"> Other</label>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="field-label">Details</label>
                                <textarea class="line-input" placeholder="Your message" style="min-height: 100px;"></textarea>
                            </div>
                            <button type="submit" class="submit-btn">Get in touch</button>
                        </form>
                    </div>
                `
            },
            { id: 'faq', title: '<h1 class="hero-title">FAQ</h1>' },
            { id: 'notes', title: '<h1 class="hero-title">Notes</h1>' }
        ];

        const container = document.getElementById('main-container');
        sections.forEach(sec => {
            const sectionNode = document.createElement('section');
            sectionNode.id = sec.id;
            sectionNode.innerHTML = `<div class="content-center">${sec.title}</div>` + footerHTML;
            container.appendChild(sectionNode);
        });

        const moreBtn = document.getElementById('moreBtn');
        const moreDropdown = document.getElementById('moreDropdown');
        moreBtn.onclick = (e) => { e.stopPropagation(); moreDropdown.classList.toggle('show'); };
        window.onclick = () => moreDropdown.classList.remove('show');

        function route() {
            const hash = window.location.hash || '#home';
            document.querySelectorAll('main section').forEach(s => s.style.display = 'none');
            const target = document.querySelector(hash);
            if (target) {
                target.style.display = 'flex';
                window.scrollTo(0, 0);
            }
        }
        window.onhashchange = route;
        window.onload = route;

        const nameText = "KAVEESHA KARUNARATHNA";
        const tagText = "Product Engineer (HAI) | Creative Technologist";
        let ni = 0, ti = 0;
        function type() {
            const nameEl = document.getElementById('name');
            const tagEl = document.getElementById('tagline');
            if (nameEl && ni < nameText.length) {
                nameEl.innerHTML += nameText.charAt(ni++);
                setTimeout(type, 80);
            } else if (tagEl && ti < tagText.length) {
                tagEl.innerHTML += tagText.charAt(ti++);
                setTimeout(type, 40);
            }
        }
        type();

        tsParticles.load("tsparticles", {
            fpsLimit: 120,
            particles: {
                number: { value: 80, density: { enable: true, area: 800 } },
                color: { value: "#ffffff" },
                opacity: { value: { min: 0.1, max: 0.4 }, animation: { enable: true, speed: 1 } },
                size: { value: { min: 1, max: 2 } },
                move: { enable: true, speed: 0.3, direction: "none", outModes: "out" }
            },
            interactivity: {
                events: { onHover: { enable: true, mode: "grab" } },
                modes: { grab: { distance: 140, links: { opacity: 0.1 } } }
            }
        });
    </script>
</body>
</html>
