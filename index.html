<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAVEESHA KARUNARATHNA | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root {
            --bg: #000000;
            --primary: #ffffff;
            --secondary: #888888;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.12);
            --blur: blur(25px);
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.7), inset 0 1px 1px rgba(255, 255, 255, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { 
            width: 100%; min-height: 100%; background: var(--bg); 
            font-family: 'Inter', sans-serif; color: var(--primary);
            overflow-x: hidden; scroll-behavior: smooth;
        }

        #tsparticles { position: fixed; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

        /* --- NAVIGATION --- */
        nav { 
            position: fixed; top: 30px; right: 30px; 
            display: flex; gap: 8px; z-index: 1000; 
            flex-wrap: wrap; justify-content: flex-end;
        }
        .nav-item {
            text-decoration: none; color: #fff; font-size: 0.65rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1.5px; padding: 10px 18px;
            border-radius: 100px; background: var(--glass); backdrop-filter: var(--blur);
            border: 1px solid var(--border); box-shadow: var(--shadow); 
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); cursor: pointer;
            white-space: nowrap;
        }
        .nav-item:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-2px); border-color: #fff; }

        /* --- MAIN LAYOUT --- */
        main { position: relative; z-index: 1; width: 100%; }
        section {
            display: none; min-height: 100vh; flex-direction: column; 
            align-items: center; justify-content: flex-start;
            padding: 120px 24px 60px; animation: sectionFade 0.8s ease forwards;
        }
        @keyframes sectionFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .content-center { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; max-width: 1100px; margin: 0 auto; }
        .hero-title { font-size: clamp(2.2rem, 10vw, 5rem); font-weight: 800; letter-spacing: -2px; text-align: center; margin-bottom: 20px; line-height: 1.1; }
        .sub-title { font-size: 1rem; color: var(--secondary); text-align: center; max-width: 600px; line-height: 1.5; }

        /* --- WORK GRID --- */
        .work-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 25px; 
            width: 100%; 
            margin-top: 40px; 
        }
        .project-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            transition: 0.4s ease;
            backdrop-filter: var(--blur);
            display: flex;
            flex-direction: column;
        }
        .project-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: var(--shadow);
        }
        .project-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-bottom: 1px solid var(--border);
        }
        .project-info { padding: 25px; text-align: left; }
        .project-category { 
            font-size: 0.6rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            color: var(--secondary); 
            margin-bottom: 8px; 
            font-weight: 800;
        }
        .project-title { font-size: 1.25rem; font-weight: 800; margin-bottom: 12px; line-height: 1.2; }
        .project-desc { font-size: 0.85rem; color: var(--secondary); line-height: 1.6; margin-bottom: 15px; }
        .project-skills { display: flex; flex-wrap: wrap; gap: 8px; }
        .skill-tag { font-size: 0.65rem; padding: 4px 10px; border-radius: 50px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff; }

        /* --- ABOUT SECTION --- */
        .about-wrapper { display: flex; flex-direction: column; align-items: center; gap: 30px; text-align: center; max-width: 800px; }
        .about-photo { width: 150px; height: 150px; border-radius: 25px; object-fit: cover; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .about-text { font-size: clamp(1rem, 4vw, 1.15rem); line-height: 1.7; color: var(--secondary); }
        .about-text strong { color: var(--primary); font-weight: 600; }
        .about-tagline { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 3px; color: var(--primary); margin-top: 20px; font-weight: 800; border-top: 1px solid var(--border); padding-top: 20px; }

        /* --- CONTACT SECTION --- */
        .contact-wrapper { display: grid; grid-template-columns: 1fr 1.2fr; gap: 50px; width: 100%; text-align: left; }
        .contact-left h1 { font-size: clamp(2.5rem, 6vw, 3.5rem); font-weight: 800; margin-bottom: 20px; letter-spacing: -2px; line-height: 1; }
        .contact-left p { color: var(--secondary); line-height: 1.6; font-size: 1.05rem; }
        .contact-left a { color: var(--primary); text-decoration: underline; text-underline-offset: 4px; }
        
        .contact-form { display: flex; flex-direction: column; gap: 25px; width: 100%; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .field-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--secondary); font-weight: 600; }
        .line-input { background: transparent; border: none; border-bottom: 1px solid var(--border); padding: 12px 0; color: #fff; font-size: 1rem; font-family: inherit; transition: 0.3s; outline: none; border-radius: 0; }
        .line-input:focus { border-bottom-color: #fff; }
        
        .checkbox-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 8px; }
        .checkbox-field { display: flex; align-items: center; gap: 12px; cursor: pointer; font-size: 0.9rem; color: var(--secondary); padding: 5px 0; }
        .checkbox-field input { width: 18px; height: 18px; accent-color: #fff; cursor: pointer; }
        .submit-btn { background: #fff; color: #000; border: none; padding: 18px; border-radius: 100px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.4s; margin-top: 15px; font-size: 0.75rem; }

        /* --- FOOTER --- */
        .pro-footer { width: 100%; max-width: 1100px; padding: 60px 24px; margin-top: 100px; border-top: 1px solid var(--border); display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 40px; }
        .footer-photo-small { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); }
        .footer-col h4 { font-size: 0.6rem; color: var(--secondary); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        .footer-col a { display: flex; align-items: center; gap: 10px; color: var(--primary); text-decoration: none; font-size: 0.85rem; margin-bottom: 10px; opacity: 0.6; transition: 0.3s; }
        .footer-col a:hover { opacity: 1; }
        .footer-bottom { grid-column: 1 / -1; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; padding-top: 30px; border-top: 1px solid rgba(255,255,255,0.05); gap: 20px; }
        .copyright { font-size: 0.6rem; color: var(--secondary); letter-spacing: 1px; text-transform: uppercase; }

        @media (max-width: 768px) {
            nav { top: 15px; right: 0; left: 0; justify-content: center; padding: 0 15px; }
            .contact-wrapper { grid-template-columns: 1fr; gap: 40px; text-align: center; }
            .footer-bottom { justify-content: center; text-align: center; }
        }
    </style>
</head>
<body>

    <div id="tsparticles"></div>

    <nav>
        <a href="#home" class="nav-item">Home</a>
        <a href="#about" class="nav-item">About</a>
        <a href="#work" class="nav-item">Work</a>
        <a href="#contact" class="nav-item">Contact</a>
    </nav>

    <main id="main-container"></main>

    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>

    <script>
        const myPhoto = "profile.jpg"; 

        const footerHTML = `
            <footer class="pro-footer">
                <div class="footer-col">
                    <img src="${myPhoto}" class="footer-photo-small" onerror="this.src='https://via.placeholder.com/50'">
                </div>
                <div class="footer-col">
                    <h4>Hello</h4>
                    <a href="#about">About</a>
                    <a href="#work">Work</a>
                    <a href="#contact">Contact</a>
                </div>
                <div class="footer-col">
                    <h4>Social</h4>
                    <a href="https://www.linkedin.com/in/kaveesha-karunarathna-knk/" target="_blank"><i class="fa-brands fa-linkedin"></i> LinkedIn</a>
                    <a href="https://github.com/Kaveesha-Karunarathna" target="_blank"><i class="fa-brands fa-github"></i> GitHub</a>
                    <a href="https://www.instagram.com/kaveesha_nimnadh/" target="_blank"><i class="fa-brands fa-instagram"></i> Instagram</a>
                </div>
                <div class="footer-bottom">
                    <div class="copyright">© 2026 KAVEESHA KARUNARATHNA</div>
                </div>
            </footer>
        `;

        const projects = [
            { 
                title: "GreenSpace Interiors", 
                cat: "Marketing Brochure", 
                desc: "Tri-fold brochure for an interior design firm. Focused on natural styles, forest greens, and warm wood tones.", 
                img: "project1.png",
                skills: ["Layout Design", "Print Marketing", "Architectural Drawing"]
            },
            { 
                title: "Vertex Architecture", 
                cat: "Minimalist Brand Identity", 
                desc: "Logo design combining geometric shapes with structural lines to reflect industry precision.", 
                img: "project2.png",
                skills: ["Logo Design", "Brand Identity", "Geometric Illustration"]
            },
            { 
                title: "TechFlow Infographic", 
                cat: "Product Visualization", 
                desc: "Exploded product view designed to help users understand complex hardware through simple visuals.", 
                img: "project3.png",
                skills: ["Technical Illustration", "Information Design", "Vector Art"]
            },
            { 
                title: "Process Flow Roadmap", 
                cat: "Information Design", 
                desc: "A 5-step workflow utilizing an 'S' curve to guide project progression from start to finish.", 
                img: "project4.png",
                skills: ["Information Design", "Process Mapping", "Vector Graphics"]
            },
            { 
                title: "Aura Marketing", 
                cat: "Social Media Brand Kit", 
                desc: "Consistent Instagram kit ensuring brand recognition through unified colors, fonts, and layouts.", 
                img: "project5.png",
                skills: ["Social Media Design", "Brand Consistency", "Digital Marketing"]
            },
            { 
                title: "Urban Shadows", 
                cat: "Minimalist Book Layout", 
                desc: "Two-page spread for a photography book balancing high-contrast imagery with elegant typography.", 
                img: "project6.png",
                skills: ["Editorial Design", "Typography", "Layout Grids"]
            }
        ];

        const sections = [
            { id: 'home', title: '<h1 class="hero-title" id="name"></h1><div class="sub-title" id="tagline"></div>' },
            { 
                id: 'about', 
                title: `
                    <div class="about-wrapper">
                        <img src="${myPhoto}" alt="Kaveesha" class="about-photo" onerror="this.src='https://via.placeholder.com/150'">
                        <h1 class="hero-title">About</h1>
                        <div class="about-text">
                            Hey! I’m <strong>Kaveesha Karunarathna</strong>, a Product Engineer (HAI) and Creative Technologist.<br><br>
                            I bridge the gap between human intuition and machine intelligence by architecting logic-driven digital environments. Currently, I am a BIT Undergraduate at the <strong>University of Moratuwa</strong>.<br><br>
                            As a former Senior Prefect and President of the <strong>Astronomical Society</strong>, I lead with an analytical mindset to engineer seamless AI interactions that solve real problems.
                        </div>
                        <div class="about-tagline">Design Logic. Build Intelligence. Ship Outcomes.</div>
                    </div>
                `
            },
            { 
                id: 'work', 
                title: `
                    <h1 class="hero-title">My Projects</h1>
                    <div class="sub-title">Design Meets Intelligence</div>
                    <div class="work-grid">
                        ${projects.map(p => `
                            <div class="project-card">
                                <img src="${p.img}" class="project-img" onerror="this.src='https://via.placeholder.com/400x250'">
                                <div class="project-info">
                                    <div class="project-category">${p.cat}</div>
                                    <div class="project-title">${p.title}</div>
                                    <div class="project-desc">${p.desc}</div>
                                    <div class="project-skills">
                                        ${p.skills.map(s => `<span class="skill-tag">${s}</span>`).join('')}
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                ` 
            },
            { 
                id: 'contact', 
                title: `
                    <div class="contact-wrapper">
                        <div class="contact-left">
                            <h1>Let's get in touch!</h1>
                            <p>For business enquiries, <a href="mailto:kaveesha.media@gmail.com" style="color:#fff;">email me</a> or complete the form.<br><br>
                            Interested in AI, product engineering, or creative technology? Let's connect.</p>
                        </div>
                        <form class="contact-form">
                            <div class="form-group"><label class="field-label">My name is</label><input type="text" class="line-input" placeholder="Your name" required></div>
                            <div class="form-group"><label class="field-label">My email is</label><input type="email" class="line-input" placeholder="Your email" required></div>
                            <div class="form-group">
                                <label class="field-label">I'm looking for:</label>
                                <div class="checkbox-grid">
                                    <label class="checkbox-field"><input type="checkbox"> Product Engineering (HAI)</label>
                                    <label class="checkbox-field"><input type="checkbox"> Rapid Prototyping & MVP Development</label>
                                    <label class="checkbox-field"><input type="checkbox"> AI Strategy & Implementation</label>
                                    <label class="checkbox-field"><input type="checkbox"> Creative Tech & Content Partnerships</label>
                                </div>
                            </div>
                            <div class="form-group"><label class="field-label">Brief Summary</label><textarea class="line-input" placeholder="Your message" style="min-height: 80px;"></textarea></div>
                            <button type="submit" class="submit-btn">Get in touch</button>
                        </form>
                    </div>
                `
            }
        ];

        const container = document.getElementById('main-container');
        sections.forEach(sec => {
            const sectionNode = document.createElement('section');
            sectionNode.id = sec.id;
            sectionNode.innerHTML = `<div class="content-center">${sec.title}</div>` + footerHTML;
            container.appendChild(sectionNode);
        });

        function route() {
            const hash = window.location.hash || '#home';
            document.querySelectorAll('main section').forEach(s => s.style.display = 'none');
            const target = document.querySelector(hash);
            if (target) {
                target.style.display = 'flex';
                window.scrollTo(0, 0);
            }
        }
        window.onhashchange = route;
        window.onload = route;

        const nameText = "KAVEESHA KARUNARATHNA";
        const tagText = "Product Engineer (HAI) | Creative Technologist";
        let ni = 0, ti = 0;
        function type() {
            const nameEl = document.getElementById('name');
            const tagEl = document.getElementById('tagline');
            if (nameEl && ni < nameText.length) {
                nameEl.innerHTML += nameText.charAt(ni++);
                setTimeout(type, 70);
            } else if (tagEl && ti < tagText.length) {
                tagEl.innerHTML += tagText.charAt(ti++);
                setTimeout(type, 30);
            }
        }
        type();

        tsParticles.load("tsparticles", {
            fpsLimit: 120,
            particles: {
                number: { value: 50, density: { enable: true, area: 800 } },
                color: { value: "#ffffff" },
                opacity: { value: { min: 0.1, max: 0.3 } },
                size: { value: { min: 1, max: 1.5 } },
                move: { enable: true, speed: 0.2, direction: "none", outModes: "out" }
            },
            interactivity: {
                events: { onHover: { enable: true, mode: "grab" } },
                modes: { grab: { distance: 140, links: { opacity: 0.1 } } }
            }
        });
    </script>
</body>
</html>
