<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAVEESHA KARUNARATHNA | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000; --text-primary: #FFFFFF; --text-secondary: #AAAAAA;
            --glass-bg: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.18);
            --glass-blur: blur(30px);
            --glass-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.3), inset 0 -1px 1px rgba(0, 0, 0, 0.2), 0 20px 50px rgba(0, 0, 0, 0.6);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background-color: var(--bg-color); font-family: 'Inter', sans-serif; color: var(--text-primary); overflow: hidden; }
        #tsparticles { position: fixed; width: 100%; height: 100%; z-index: 1; }
        
        nav { position: fixed; top: 15px; right: 15px; display: flex; gap: 10px; z-index: 100; }
        .nav-item { text-decoration: none; color: white; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; padding: 10px 18px; border-radius: 50px; background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); transition: 0.3s ease; cursor: pointer; }
        .nav-item:hover { background: rgba(255, 255, 255, 0.1); }

        .dropdown { position: relative; }
        .dropdown-content { display: none; position: absolute; right: 0; top: 50px; min-width: 160px; background: rgba(10, 10, 10, 0.8); backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); border-radius: 20px; overflow: hidden; }
        .dropdown-content.show { display: block; }
        .dropdown-content a { color: white; padding: 14px 20px; text-decoration: none; display: block; font-size: 0.75rem; }
        .dropdown-content a:hover { background: rgba(255, 255, 255, 0.1); }

        main { position: relative; z-index: 2; width: 100%; height: 100vh; }
        section { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; animation: fadeIn 0.5s ease forwards; }
        
        .hero h1 { font-size: 10vw; background: linear-gradient(135deg, #fff 0%, #888 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; }
        .glass-card { background: var(--glass-bg); backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); border-radius: 32px; padding: 40px; max-width: 800px; width: 100%; box-shadow: var(--glass-shadow); text-align: center; }
        
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div id="tsparticles"></div>
    
    <nav>
        <a href="#home" class="nav-item">Home</a>
        <a href="#about" class="nav-item">About</a>
        <div class="dropdown">
            <div class="nav-item" id="moreBtn">More ▾</div>
            <div class="dropdown-content" id="moreDropdown">
                <a href="#contact">Contact Me</a>
                <a href="#faq">FAQ</a>
                <a href="#notes">Notes</a>
            </div>
        </div>
    </nav>

    <main>
        <section id="home" style="display: flex;">
            <h1 id="typed-name"></h1>
        </section>

        <section id="about">
            <div class="glass-card">
                <h2>About Me</h2>
                <p>Product Engineer (HAI) & Creative Technologist. I architect logic and build interfaces where human intent meets AI.</p>
            </div>
        </section>

        <section id="contact"><div class="glass-card"><h2>Contact</h2><p>Email: yourname@example.com</p></div></section>
        <section id="faq"><div class="glass-card"><h2>FAQ</h2><p>Coming soon.</p></div></section>
        <section id="notes"><div class="glass-card"><h2>Notes</h2><p>Engineering logs.</p></div></section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
    <script>
        // Dropdown Logic
        const moreBtn = document.getElementById('moreBtn');
        const moreDropdown = document.getElementById('moreDropdown');
        moreBtn.onclick = (e) => { e.stopPropagation(); moreDropdown.classList.toggle('show'); };
        window.onclick = () => moreDropdown.classList.remove('show');

        // Page Routing Logic (The "Separate Page" feeling)
        function handleRoute() {
            const hash = window.location.hash || '#home';
            document.querySelectorAll('main section').forEach(s => s.style.display = 'none');
            const target = document.querySelector(hash);
            if (target) target.style.display = 'flex';
        }

        window.addEventListener('hashchange', handleRoute);
        window.addEventListener('load', handleRoute);

        // Particle Background
        tsParticles.load("tsparticles", { fpsLimit: 60, particles: { number: { value: 100 }, color: { value: "#ffffff" }, shape: { type: "circle" }, opacity: { value: 0.5 }, size: { value: 2 }, move: { enable: true, speed: 0.8 } }, interactivity: { events: { onHover: { enable: true, mode: "repulse" } } } });

        // Simple Typewriter
        const nameText = "KAVEESHA KARUNARATHNA";
        let i = 0;
        function type() {
            if (i < nameText.length) {
                document.getElementById("typed-name").innerHTML += nameText.charAt(i);
                i++; setTimeout(type, 100);
            }
        }
        type();
    </script>
</body>
</html>
