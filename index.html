<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAVEESHA KARUNARATHNA | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #000000;
            --text-primary: #FFFFFF;
            --text-secondary: #AAAAAA;
            --animation-cursor: #AAAAAA;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
        }

        #tsparticles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            pointer-events: none; 
            padding: 0 20px; 
        }

        h1 {
            font-size: 8vw; 
            margin: 0;
            margin-bottom: 10px;
            letter-spacing: -1.5px;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            min-height: 1.2em; 
        }

        @media (min-width: 1024px) {
            h1 { font-size: 3.5rem; }
        }

        .typewriter-container {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 300;
            opacity: 0.9;
            min-height: 1.5em;
        }

        .cursor {
            color: var(--animation-cursor);
            animation: blink 0.8s infinite;
            font-weight: bold;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="tsparticles"></div>

    <div class="content">
        <h1 id="typed-name"></h1>
        
        <div class="typewriter-container">
            <span id="typed-text"></span><span class="cursor">|</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>

    <script>
        // === SEQUENTIAL TYPEWRITER EFFECT ===
        document.addEventListener("DOMContentLoaded", () => {
            const nameToType = "KAVEESHA KARUNARATHNA";
            const sublineToType = "Creative Developer | Space Enthusiast";
            
            const nameElement = document.getElementById("typed-name");
            const sublineElement = document.getElementById("typed-text");
            
            let nIndex = 0;
            let sIndex = 0;

            function typeName() {
                if (nIndex < nameToType.length) {
                    nameElement.innerHTML += nameToType.charAt(nIndex);
                    nIndex++;
                    setTimeout(typeName, 80);
                } else {
                    setTimeout(typeSubline, 500);
                }
            }

            function typeSubline() {
                if (sIndex < sublineToType.length) {
                    sublineElement.innerHTML += sublineToType.charAt(sIndex);
                    sIndex++;
                    setTimeout(typeSubline, 50);
                }
            }

            typeName();
        });

        // === STARFIELD BACKGROUND WITH GYROSCOPE ===
        tsParticles.load("tsparticles", {
            fpsLimit: 60,
            background: { color: "#000000" },
            particles: {
                number: { value: 160 },
                color: { value: "#ffffff" },
                shape: { type: "circle" },
                opacity: { value: { min: 0.2, max: 0.8 } },
                size: { value: { min: 1, max: 3 } },
                move: {
                    enable: true,
                    speed: 0.4,
                    direction: "none",
                    outModes: { default: "out" },
                }
            },
            interactivity: {
                events: {
                    onHover: { enable: true, mode: "grab" },
                    onClick: { enable: true, mode: "push" },
                    resize: true
                },
                modes: {
                    grab: {
                        distance: 180,
                        links: { opacity: 0.4 }
                    }
                }
            },
            // THE GYRO FIX:
            sensors: {
                deviceOrientation: {
                    enable: true,
                    value: 10 // This controls how much the stars react to the tilt
                }
            }
        });
    </script>
</body>
</html>
